<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Cythora — Vocabulary Dictionary</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #1a1209;
  --parch: #f5ead4;
  --parch-dk: #e9d8b2;
  --parch-deep: #d6c08a;
  --gold: #b8860b;
  --gold-lt: #d4a017;
  --gold-dim: #7a5c08;
  --teal: #1b4744;
  --teal-lt: #256b66;
  --teal-pale: #e4f0ef;
  --amber: #7a3a00;
  --amber-pale: #fdf0e0;
  --border: rgba(184,134,11,0.22);
  --shadow: rgba(26,18,9,0.14);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  background: var(--parch);
  color: var(--ink);
  font-family: 'Crimson Pro', Georgia, serif;
  font-size: 17px;
  line-height: 1.6;
  min-height: 100vh;
}

/* ── HEADER ── */
.site-header {
  background: var(--ink);
  border-bottom: 2px solid var(--gold);
  padding: 0 2rem;
  display: flex; align-items: center; justify-content: space-between;
  height: 56px; position: sticky; top: 0; z-index: 100;
}
.header-left {
  display: flex; align-items: center; gap: 1.2rem;
}
.header-brand {
  font-family: 'Cinzel', serif; font-size: 1.1rem;
  font-weight: 700; color: var(--gold);
  text-decoration: none; letter-spacing: 0.1em;
}
.header-sep { color: var(--gold-dim); font-size: 0.9rem; }
.header-title {
  font-family: 'Cinzel', serif; font-size: 0.7rem;
  letter-spacing: 0.2em; text-transform: uppercase;
  color: #b8a070;
}
.back-link {
  font-family: 'Cinzel', serif; font-size: 0.65rem;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--gold-dim); text-decoration: none;
  border: 1px solid var(--gold-dim); padding: 0.3rem 0.9rem;
  border-radius: 3px; transition: color 0.2s, border-color 0.2s;
}
.back-link:hover { color: var(--gold); border-color: var(--gold); }

/* ── HERO ── */
.dict-hero {
  background: var(--ink);
  padding: 3rem 2rem 2.5rem;
  text-align: center;
  border-bottom: 1px solid var(--gold-dim);
}
.dict-hero h1 {
  font-family: 'Cinzel', serif; font-size: 2.2rem;
  font-weight: 700; color: var(--parch);
  letter-spacing: 0.12em; margin-bottom: 0.4rem;
}
.dict-hero p {
  color: #a09060; font-style: italic; font-size: 1rem;
}
.stats-row {
  display: flex; justify-content: center; gap: 2.5rem;
  margin-top: 1.5rem; flex-wrap: wrap;
}
.stat {
  text-align: center;
}
.stat-n {
  font-family: 'Cinzel', serif; font-size: 1.6rem;
  font-weight: 700; color: var(--gold); line-height: 1;
}
.stat-l {
  font-family: 'Cinzel', serif; font-size: 0.6rem;
  letter-spacing: 0.2em; text-transform: uppercase;
  color: var(--gold-dim); margin-top: 0.2rem;
}

/* ── CONTROLS ── */
.controls {
  position: sticky; top: 56px; z-index: 90;
  background: var(--parch-dk);
  border-bottom: 1px solid var(--border);
  padding: 0.9rem 2rem;
  display: flex; gap: 1rem; align-items: center; flex-wrap: wrap;
}
.search-wrap {
  position: relative; flex: 1; min-width: 200px; max-width: 480px;
}
.search-icon {
  position: absolute; left: 0.8rem; top: 50%;
  transform: translateY(-50%); color: var(--gold-dim);
  font-size: 0.9rem; pointer-events: none;
}
#searchInput {
  width: 100%;
  background: white; color: var(--ink);
  border: 1px solid var(--border); border-radius: 6px;
  padding: 0.55rem 0.9rem 0.55rem 2.2rem;
  font-family: 'JetBrains Mono', monospace; font-size: 0.9rem;
  outline: none; transition: border-color 0.2s, box-shadow 0.2s;
}
#searchInput:focus {
  border-color: var(--gold); box-shadow: 0 0 0 3px rgba(184,134,11,0.12);
}
#searchInput::placeholder { color: #b09860; font-style: italic; }

.tab-group {
  display: flex; gap: 0; background: white;
  border: 1px solid var(--border); border-radius: 6px; overflow: hidden;
}
.tab-btn {
  padding: 0.5rem 1.1rem;
  font-family: 'Cinzel', serif; font-size: 0.65rem;
  letter-spacing: 0.12em; text-transform: uppercase;
  background: none; border: none; cursor: pointer;
  color: var(--gold-dim); transition: background 0.18s, color 0.18s;
  border-right: 1px solid var(--border);
}
.tab-btn:last-child { border-right: none; }
.tab-btn:hover { background: var(--parch-dk); color: var(--ink); }
.tab-btn.active {
  background: var(--ink); color: var(--gold);
}

.dir-group {
  display: flex; gap: 0; background: white;
  border: 1px solid var(--border); border-radius: 6px; overflow: hidden;
}
.dir-btn {
  padding: 0.5rem 1rem;
  font-family: 'Cinzel', serif; font-size: 0.62rem;
  letter-spacing: 0.1em; text-transform: uppercase;
  background: none; border: none; cursor: pointer;
  color: var(--gold-dim); transition: background 0.18s, color 0.18s;
  border-right: 1px solid var(--border); white-space: nowrap;
}
.dir-btn:last-child { border-right: none; }
.dir-btn:hover { background: var(--parch-dk); color: var(--ink); }
.dir-btn.active { background: var(--teal); color: white; }

.results-count {
  font-family: 'Cinzel', serif; font-size: 0.62rem;
  letter-spacing: 0.1em; color: var(--gold-dim);
  text-transform: uppercase; white-space: nowrap; margin-left: auto;
}

/* ── ALPHA INDEX ── */
.alpha-bar {
  padding: 0.6rem 2rem;
  display: flex; gap: 0.2rem; flex-wrap: wrap;
  background: var(--parch); border-bottom: 1px solid var(--border);
}
.alpha-btn {
  font-family: 'Cinzel', serif; font-size: 0.65rem; font-weight: 600;
  width: 26px; height: 26px; border-radius: 4px;
  background: none; border: 1px solid transparent;
  cursor: pointer; color: var(--gold-dim);
  transition: all 0.15s; display: flex; align-items: center; justify-content: center;
}
.alpha-btn:hover { border-color: var(--border); color: var(--ink); }
.alpha-btn.has-entries { color: var(--teal); }
.alpha-btn.active { background: var(--ink); color: var(--gold); border-color: transparent; }

/* ── DICTIONARY LIST ── */
.dict-body {
  max-width: 1100px; margin: 0 auto;
  padding: 1.5rem 2rem 6rem;
}

.letter-section { margin-bottom: 2.5rem; }
.letter-anchor {
  font-family: 'Cinzel', serif; font-size: 1.8rem; font-weight: 700;
  color: var(--parch-deep); letter-spacing: 0.1em;
  padding: 0.5rem 0; margin-bottom: 0.8rem;
  border-bottom: 2px solid var(--border);
  display: flex; align-items: center; gap: 0.8rem;
}
.letter-count {
  font-size: 0.65rem; color: var(--gold-dim); letter-spacing: 0.1em;
  text-transform: uppercase; font-weight: 400; margin-top: 0.3rem;
}

.entry-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 0.6rem;
}

.entry {
  background: white; border: 1px solid var(--border);
  border-radius: 7px; padding: 0.75rem 1rem;
  transition: box-shadow 0.15s, border-color 0.15s, transform 0.12s;
  cursor: default;
}
.entry:hover {
  box-shadow: 0 3px 14px var(--shadow);
  border-color: var(--gold); transform: translateY(-1px);
}
.entry-top {
  display: flex; align-items: baseline;
  justify-content: space-between; gap: 0.5rem; margin-bottom: 0.25rem;
}
.entry-cy {
  font-family: 'JetBrains Mono', monospace;
  font-size: 1rem; font-weight: 500;
  color: var(--teal); line-height: 1.2;
}
.entry-type {
  font-family: 'Cinzel', serif; font-size: 0.55rem;
  letter-spacing: 0.15em; text-transform: uppercase;
  padding: 0.12rem 0.5rem; border-radius: 10px;
  flex-shrink: 0;
}
.entry-type.noun {
  background: var(--amber-pale); color: var(--amber);
  border: 1px solid rgba(122,58,0,0.2);
}
.entry-type.verb {
  background: var(--teal-pale); color: var(--teal);
  border: 1px solid rgba(27,71,68,0.2);
}
.entry-stem {
  font-family: 'JetBrains Mono', monospace; font-size: 0.72rem;
  color: var(--gold-dim); margin-bottom: 0.2rem;
}
.entry-en {
  font-size: 0.88rem; color: #5a4020; line-height: 1.5;
}
.entry-en .primary { color: var(--ink); font-weight: 600; }
.entry-en .alts { color: #8a6a30; }

/* reversed direction - en→cy */
.entry.reversed .entry-cy {
  font-size: 0.88rem; color: #5a4020;
  font-family: 'Crimson Pro', serif; font-weight: 600;
}
.entry.reversed .entry-en {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.92rem; color: var(--teal); font-weight: 500;
}

/* empty state */
.empty-state {
  text-align: center; padding: 5rem 2rem; color: var(--gold-dim);
}
.empty-state p { font-family: 'Cinzel', serif; font-size: 0.8rem; letter-spacing: 0.2em; text-transform: uppercase; }

/* highlight */
mark { background: rgba(184,134,11,0.22); color: inherit; border-radius: 2px; padding: 0 1px; }

/* scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--parch); }
::-webkit-scrollbar-thumb { background: var(--parch-deep); border-radius: 3px; }

@media(max-width:640px){
  .controls { padding: 0.8rem 1rem; gap: 0.6rem; }
  .dict-body { padding: 1rem 1rem 5rem; }
  .alpha-bar { padding: 0.5rem 1rem; }
  .entry-grid { grid-template-columns: 1fr; }
  .results-count { display: none; }
}
</style>
</head>

usion", "exclusivity", "suspension", "disfranchisement", "prohibition", "forbiddance", "inhibition", "rustication"], "type": "noun", "stem": null}, {"cy": "vonistakdra", "en": ["exclude", "suspend", "disfranchise", "prohibit", "forbid", "inhibit", "rusticate"], "type": "verb", "stem": "vonistak"}, {"cy": "voros", "en": ["proposal", "proposition", "suggestion"], "type": "noun", "stem": null}, {"cy": "vorosdra", "en": ["propose", "suggest", "recommend"], "type": "verb", "stem": "voros"}, {"cy": "vosmilif", "en": ["desire", "wish"], "type": "noun", "stem": null}, {"cy": "vosmilifdra", "en": ["desire", "wish"], "type": "verb", "stem": "vosmilif"}, {"cy": "vospar", "en": ["share", "impartation"], "type": "noun", "stem": null}, {"cy": "vospardra", "en": ["share", "impart"], "type": "verb", "stem": "vospar"}, {"cy": "vosparo", "en": ["impartment"], "type": "noun", "stem": null}, {"cy": "vre", "en": ["dimness"], "type": "noun", "stem": null}, {"cy": "vredra", "en": ["dim"], "type": "verb", "stem": "vre"}];

// ── State
let state = {
  query: '',
  type: 'all',
  dir: 'cy',
  letter: null
};

// ── For en→cy direction, expand entries so each english word is a key
function buildEnEntries(entries) {
  const map = {};
  entries.forEach(e => {
    e.en.forEach(enWord => {
      const k = enWord.toLowerCase();
      if (!map[k]) map[k] = [];
      map[k].push(e);
    });
  });
  return map;
}
const EN_MAP = buildEnEntries(RAW);

function getFiltered() {
  const q = state.query.toLowerCase().trim();
  let pool = RAW;

  // Type filter
  if (state.type !== 'all') pool = pool.filter(e => e.type === state.type);

  if (state.dir === 'cy') {
    if (q) pool = pool.filter(e =>
      e.cy.toLowerCase().includes(q) ||
      e.en.some(w => w.toLowerCase().includes(q))
    );
    if (state.letter) pool = pool.filter(e => e.cy[0].toLowerCase() === state.letter);
    return pool;
  } else {
    // en→cy: collect matching english words
    let results = [];
    if (q) {
      Object.entries(EN_MAP).forEach(([enWord, entries]) => {
        if (enWord.includes(q)) {
          entries.forEach(e => {
            if (state.type === 'all' || e.type === state.type) {
              if (!results.find(r => r.cy === e.cy)) results.push(e);
            }
          });
        }
      });
    } else {
      results = pool;
      if (state.letter) results = results.filter(e =>
        e.en[0][0].toLowerCase() === state.letter
      );
    }
    return results;
  }
}

function highlight(text, q) {
  if (!q) return text;
  const re = new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
  return text.replace(re, '<mark>$1</mark>');
}

function renderEntry(e, q) {
  const isReversed = state.dir === 'en';
  const primary = e.en[0];
  const alts = e.en.slice(1);
  const stem = e.stem ? `<div class="entry-stem">stem: ${e.stem}</div>` : '';

  if (!isReversed) {
    return `<div class="entry">
      <div class="entry-top">
        <span class="entry-cy">${highlight(e.cy, q)}</span>
        <span class="entry-type ${e.type}">${e.type}</span>
      </div>
      ${stem}
      <div class="entry-en">
        <span class="primary">${highlight(primary, q)}</span>
        ${alts.length ? `<span class="alts"> · ${alts.map(a=>highlight(a,q)).join(' · ')}</span>` : ''}
      </div>
    </div>`;
  } else {
    return `<div class="entry reversed">
      <div class="entry-top">
        <span class="entry-cy">${highlight(primary, q)}</span>
        <span class="entry-type ${e.type}">${e.type}</span>
      </div>
      ${alts.length ? `<div class="entry-stem">also: ${alts.slice(0,4).join(', ')}</div>` : ''}
      <div class="entry-en">${highlight(e.cy, q)}</div>
    </div>`;
  }
}

function getLetters(entries) {
  const dir = state.dir;
  const set = new Set();
  entries.forEach(e => {
    const ch = dir === 'cy' ? e.cy[0] : e.en[0][0];
    if (ch) set.add(ch.toLowerCase());
  });
  return set;
}

function renderAlphaBar(entries) {
  const allLetters = 'abcdefghijklmnopqrstuvwxyz'.split('');
  const present = getLetters(entries);
  const bar = document.getElementById('alphaBar');
  bar.innerHTML = allLetters.map(l => {
    const has = present.has(l);
    const active = state.letter === l ? 'active' : '';
    const hasClass = has ? 'has-entries' : '';
    return `<button class="alpha-btn ${hasClass} ${active}" data-letter="${l}">${l.toUpperCase()}</button>`;
  }).join('');
  bar.querySelectorAll('.alpha-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const l = btn.dataset.letter;
      state.letter = state.letter === l ? null : l;
      render();
    });
  });
}

function render() {
  const filtered = getFiltered();
  const q = state.query.toLowerCase().trim();

  // Alpha bar based on full type-filtered set (not query-filtered)
  let typePool = RAW;
  if (state.type !== 'all') typePool = typePool.filter(e => e.type === state.type);
  renderAlphaBar(typePool);

  document.getElementById('resultsCount').textContent =
    filtered.length + ' result' + (filtered.length !== 1 ? 's' : '');

  const body = document.getElementById('dictBody');

  if (filtered.length === 0) {
    body.innerHTML = `<div class="empty-state"><p>No entries found</p></div>`;
    return;
  }

  // Group by first letter
  const dir = state.dir;
  const groups = {};
  filtered.forEach(e => {
    const ch = (dir === 'cy' ? e.cy[0] : e.en[0][0] || '?').toLowerCase();
    if (!groups[ch]) groups[ch] = [];
    groups[ch].push(e);
  });

  const sortedKeys = Object.keys(groups).sort();
  body.innerHTML = sortedKeys.map(letter => {
    const items = groups[letter];
    // Sort within group
    items.sort((a,b) => {
      const ka = dir === 'cy' ? a.cy : a.en[0];
      const kb = dir === 'cy' ? b.cy : b.en[0];
      return ka.localeCompare(kb);
    });
    return `<div class="letter-section" id="sec-${letter}">
      <div class="letter-anchor">
        ${letter.toUpperCase()}
        <span class="letter-count">${items.length} ${items.length===1?'entry':'entries'}</span>
      </div>
      <div class="entry-grid">
        ${items.map(e => renderEntry(e, q)).join('')}
      </div>
    </div>`;
  }).join('');
}

// ── Controls
document.getElementById('searchInput').addEventListener('input', e => {
  state.query = e.target.value;
  state.letter = null;
  render();
});

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.type = btn.dataset.type;
    state.letter = null;
    render();
  });
});

document.querySelectorAll('.dir-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.dir-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.dir = btn.dataset.dir;
    state.query = '';
    state.letter = null;
    document.getElementById('searchInput').value = '';
    document.getElementById('searchInput').placeholder =
      state.dir === 'cy' ? 'Search Cythora or English…' : 'Search English…';
    render();
  });
});

// Initial render
render();
</script>
